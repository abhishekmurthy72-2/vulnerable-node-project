# - task: Building dependencies 
#   input: 
#     script: "mvn clean install -U"    
- task: Application security testing@2026
  displayName: Running SCA using SCA Resolver
  inputs:
    projectName: '$(projectName)'
    enableProxy: false
    enableSastScan: false
    enableDependencyScan: true
    dependencyServerURL: 'CXSCACHAMPION'
    scaTeam: '/Champions'

  ## Only required when you need exploitable path  
    isEnableScaResolver: true
    pathToScaResolver: '$(Build.SourcesDirectory)'
    scaResolverAddParameters: '-s $(Build.SourcesDirectory) -n $(projectName)  -r scaResults/results.json --sast-result-path sastResults/results.json --cxuser $(sastUsername) --cxserver $(sastUrl) --cxpassword $(sastPassword) --cxprojectname $(projectName)  --log-level Debug'