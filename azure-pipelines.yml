# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'Run a multi-line script'


- task: Application security testing@2026
  inputs:
    projectName: 'testsastproj'
    enableProxy: false
    enableSastScan: true
    CheckmarxService: 'CheckmarxSASTconnection'
    enableSastBranching: false
    fullTeamName: 'CxServer'
    enableDependencyScan: false


- task: Application security testing@2026
  inputs:
    projectName: 'Testing'
    enableProxy: false
    enableSastScan: false
    enableDependencyScan: true
    dependencyServerURL: 'CXSCACHAMPION'
    scaTeam: 'CxServer'
