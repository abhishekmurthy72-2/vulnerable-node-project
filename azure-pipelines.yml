# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: ubuntu-latest


variables:
  - group: CheckmarxCredentials  # References your variable group   # BuildprojectName
  - name: projectName
    value: 'NewTestprojectexploitablepath'
  - name: System.Debug
    value: true  # ← Enable debug logging for sca resolver

steps:

- task: Application security testing@2026
  displayName: Running Checkmarx CxSAST scanning
  inputs:
    projectName: '$(projectName)'
    enableProxy: false
    enableSastScan: true
    CheckmarxService: 'CxSASTconnectionnew'
    enableSastBranching: false
    preset: 'All'
    fullTeamName: 'CxServer'
    overrideProjectSettings: true
    fullScansScheduled: true
    fullScanCycle: '99' # After how many incremental scans you want to enable full scan
    comment: 'Scan-Origin - Azure DevOps, Branch - $(Build.SourceBranchName)' #Comments will reflect in the cxsast scans for placeholders and filters
    vulnerabilityThreshold: true
    failBuildForNewVulnerabilitiesEnabled: false
    failBuildForNewVulnerabilitiesSeverity: 'CRITICAL'
    critical: '300'
    high: '10'
    medium: '10'
    low: '10'
    enableDependencyScan: false
 
#******The below Dowloading and extract SCA Resolver is optional if your agent already has an SCA path available *******
- task: CmdLine@2
  displayName: Downloading and extract SCA Resolver
  inputs:
    script: |
      echo ---------- Downloading and installing SCA Resolver ----------
      curl -L https://sca-downloads.s3.amazonaws.com/cli/latest/ScaResolver-linux64.tar.gz -o ScaResolver-linux64.tar.gz
      tar -xvf ScaResolver-linux64.tar.gz
      rm ScaResolver-linux64.tar.gz
      chmod +x ScaResolver
      ls -l
