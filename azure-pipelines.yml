- task: CmdLine@2
  displayName: 'Debug: Check ScaResolver and Environment'
  inputs:
    script: |
      echo "=== Current Directory ==="
      pwd
      
      echo "=== ScaResolver Location and Permissions ==="
      ls -la $(Build.SourcesDirectory)/ScaResolver
      file $(Build.SourcesDirectory)/ScaResolver
      
      echo "=== Testing ScaResolver Execution ==="
      $(Build.SourcesDirectory)/ScaResolver --version 2>&1 || true
      echo "Exit code: $?"
      
      echo "=== Environment Check ==="
      echo "PATH: $PATH"
      which java || echo "Java not found"
      ldd $(Build.SourcesDirectory)/ScaResolver 2>&1 | head -20 || true
      
      echo "=== Disk Space ==="
      df -h $(Build.SourcesDirectory)
      
      echo "=== Source Directory Contents ==="
      ls -la $(Build.SourcesDirectory) | head -20


      
- task: Application security testing@2026
  displayName: Running SCA using SCA Resolver
  inputs:
    projectName: '$(projectName)'
    enableProxy: false
    enableSastScan: false
    enableDependencyScan: true
    dependencyServerURL: 'CXSCACHAMPION'
    scaTeam: '/Champions'
    isEnableScaResolver: true
    pathToScaResolver: '$(Build.SourcesDirectory)'
    scaResolverAddParameters: '-s $(Build.SourcesDirectory) -n $(projectName) -a $(scaTenant) -u $(scaUsername) -p $(scaPassword) --cxuser $(sastUsername) --cxserver $(sastUrl) --cxpassword $(sastPassword) --cxprojectname $(projectName)  --log-level Debug'