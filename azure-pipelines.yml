 #******The below Dowloading and extract SCA Resolver is optional if your agent already has an SCA path available *******
- task: CmdLine@2
  displayName: Downloading and extract SCA Resolver
  inputs:
    script: |
      echo ---------- Downloading and installing SCA Resolver ----------
      curl -L https://sca-downloads.s3.amazonaws.com/cli/latest/ScaResolver-linux64.tar.gz -o ScaResolver-linux64.tar.gz
      tar -xvf ScaResolver-linux64.tar.gz
      rm ScaResolver-linux64.tar.gz
      chmod +x ScaResolver
      ls -l
#************************************************************** 

- task: Application security testing@2026
  displayName: Running SCA using SCA Resolver
  inputs:
    projectName: '$(projectName)'
    enableProxy: false
    enableSastScan: false
    enableDependencyScan: true
    dependencyServerURL: 'CXSCACHAMPION'
    scaTeam: 'CxServer/SCA-PM/Champions/Resolver-Labs'
    isEnableScaResolver: true
    pathToScaResolver: '$(Build.SourcesDirectory)'
    scaResolverAddParameters: |
      -s $(Build.SourcesDirectory)
      -r $(Build.SourcesDirectory)
      --sast-result-path $(Build.SourcesDirectory) 
      --cxserver $(sastUrl) 
      --cxuser $(sastUsername) 
      --cxpassword $(sastPassword) 
      --cxprojectname $(projectName) 
      --log-level Debug